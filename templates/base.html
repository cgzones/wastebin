<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="generator" content="wastebin {{ meta.version }}">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ meta.title }}</title>
    <link rel="preload" as="style" href="{{ base_path.join("assets/dark.css") }}">
    <link rel="preload" as="style" href="{{ base_path.join("assets/light.css") }}">
    <link rel="stylesheet" href="{{ base_path.join("assets/").join(meta.highlight.style.name) }}">
    <link rel="icon" href="{{ base_path.join("favicon.ico") }}" type="image/x-icon">
    {% block head %}{% endblock %}
  </head>
  <body>
    {% block topbody %}{% endblock %}
    <div id="main-container">
      <header>
        <nav>
          <ul id="nav_base">
            <li>
              <a href="{{ base_path.path() }}" class="navigation">home</a>
            </li>
          </ul>
          <ul id="nav_page">
            {% block nav %}{% endblock %}
          </ul>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
